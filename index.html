<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med-AI Cloud Consultation</title>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #4CAF50; }
        video { width: 100%; background: #000; border-radius: 10px; margin: 15px 0; border: 2px solid #333; }
        button { width: 100%; padding: 15px; background: #4CAF50; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        button:disabled { background: #2e7d32; cursor: not-allowed; }
        #status { font-size: 14px; padding: 10px; border-radius: 5px; background: #333; color: #4CAF50; }
    </style>

    <!-- ✅ SUPABASE CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">
    <h2>🎥 Med-AI Cloud Consultation</h2>
    
    <video id="remoteVideo" autoplay playsinline muted></video>
    
    <button id="startBtn" onclick="startCloudCall()">START CONSULTATION</button>
    <div id="status">Status: Ready to Connect</div>
</div>

<script>
const SB_URL = "https://ycrdefpwrczggakgqbdu.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljcmRlZnB3cmN6Z2dha2dxYmR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDgzOTYsImV4cCI6MjA4OTQ4NDM5Nn0.S-bTToMacfarCcGYoOVHrO0r7rhz8dZUrCW-kkrUf8A";

const supabase = window.supabase.createClient(SB_URL, SB_KEY);

const ROOM_ID = "medai_room_1";

let pc;

window.startCloudCall = async function () {
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const video = document.getElementById('remoteVideo');

    startBtn.disabled = true;
    status.innerText = "Status: Accessing Camera...";

    try {
        pc = new RTCPeerConnection({
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' }
            ]
        });

        pc.ontrack = (event) => {
            video.srcObject = event.streams[0];
            video.play().catch(() => {});
            status.innerText = "Status: Connected & Streaming!";
        };

        pc.onicecandidate = async (event) => {
            if (event.candidate) {
                await supabase.from('signaling').insert({
                    room_id: ROOM_ID,
                    type: 'candidate',
                    data: event.candidate
                });
            }
        };

        const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false
        });

        stream.getTracks().forEach(track => pc.addTrack(track, stream));

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        status.innerText = "Status: Sending Offer...";

        const { error } = await supabase.from('signaling').insert({
            room_id: ROOM_ID,
            type: 'offer',
            data: { sdp: offer.sdp, type: offer.type }
        });

        if (error) throw error;

        status.innerText = "Status: Waiting for Answer...";

        setInterval(async () => {
            const { data } = await supabase
                .from('signaling')
                .select('*')
                .eq('room_id', ROOM_ID);

            if (!data) return;

            for (let row of data) {
                if (row.type === 'answer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(row.data));
                    await supabase.from('signaling').delete().eq('id', row.id);
                    status.innerText = "Status: Connecting...";
                }

                if (row.type === 'candidate') {
                    try {
                        await pc.addIceCandidate(new RTCIceCandidate(row.data));
                    } catch {}
                    await supabase.from('signaling').delete().eq('id', row.id);
                }
            }
        }, 2000);

    } catch (e) {
        console.error(e);
        status.innerText = "Error: " + e.message;
        status.style.color = "#ff5252";
        startBtn.disabled = false;
    }
};
</script>

</body>
</html>
